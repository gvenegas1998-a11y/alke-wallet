<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wallet - Últimos Movimientos</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="./css/transaction.css">
</head>

<body>

  <nav class="navbar navbar-expand-lg bg-custom-purple shadow-sm">
    <div class="container-fluid px-4">
      <a class="navbar-brand fw-bold text-white" href="#">Alke Wallet</a>
      <div class="d-flex ms-auto">
        <a href="index.html" class="btn btn-outline-light btn-sm fw-bold px-3 rounded-pill">
          Cerrar Sesión
        </a>
      </div>
    </div>
  </nav>

  <div class="container-main">
    <h2 class="text-center mb-4">Últimos Movimientos</h2>

    <div class="mb-4">
      <label for="filter-type" class="form-label fw-bold text-muted">Filtrar por tipo:</label>
      <select id="filter-type" class="form-select">
        <option value="todos">Todos los movimientos</option>
        <option value="compra">🛍️ Compras</option>
        <option value="deposito">💵 Depósitos</option>
        <option value="transferencia enviada">💸 Transferencias Enviadas</option>
      </select>
    </div>

    <div id="transactions-list" class="list-group mb-4"></div>

    <div class="d-grid gap-2">
      <a href="menu.html" class="btn btn-secondary fw-bold">Volver al Menú Principal</a>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="./js/transaction.js"></script>
</body>

</html>
