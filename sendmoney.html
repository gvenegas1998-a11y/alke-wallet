<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wallet - Enviar Dinero</title>
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">
  <link rel="stylesheet" href="./css/sendmoney.css">
</head>

<body>
  <nav class="navbar navbar-expand-lg bg-custom-purple mb-4 shadow-sm">
    <div class="container-fluid px-4">
      <a class="navbar-brand fw-bold text-white" href="#">Alke Wallet</a>
      <div class="d-flex ms-auto">
        <a href="index.html" class="btn btn-outline-light btn-sm fw-bold px-3 rounded-pill">
          Cerrar Sesión
        </a>
      </div>
    </div>
  </nav>

  <div class="container-main">
    <h2>Enviar Dinero</h2>
    <div id="alert-container"></div>

    <form id="formEnviarDinero">
      <div class="form-group">
        <label for="searchContact" class="text-muted font-weight-bold">Buscar en la agenda de transferencias:</label>
        <input type="text" class="form-control" id="searchContact" placeholder="Buscar por nombre o alias...">
      </div>

      <button type="button" id="btnAgregarContacto" class="btn btn-block mb-3">Agregar nuevo contacto</button>

      <h3>Contactos</h3>
      <small class="text-muted d-block mb-2">Haz clic sobre un contacto para seleccionarlo:</small>
      <ul id="contactList" class="list-group">
      </ul>

      <div class="form-group style-monto mt-3">
        <label for="montoEnviar" class="text-muted font-weight-bold">Monto a enviar:</label>
        <input type="number" class="form-control" id="montoEnviar" placeholder="¿Cuánto deseas enviar?" min="1">
      </div>

      <button type="submit" id="btnSubmitEnviar" class="btn btn-success btn-block mt-3"
        style="display: none; border-radius: 8px; padding: 10px; font-weight: 600;">Enviar dinero</button>
    </form>

    <div id="confirmacion-envio" class="mt-3 alert alert-success text-center d-none" role="alert"></div>

    <a href="menu.html" class="btn btn-secondary btn-block mt-3" style="border-radius: 8px;">Volver al Menú
      Principal</a>
  </div>

  <div id="modalContacto"
    style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000;">
    <div class="container-main" style="margin-top: 80px; background: white; padding: 25px; border-radius: 15px;">
      <h3 class="mb-3">Nuevo Contacto</h3>
      <form id="formContacto">
        <div class="form-group">
          <label class="text-muted small font-weight-bold">Nombre y Apellido:</label>
          <input type="text" id="nuevoNombre" class="form-control" required placeholder="Ej: Carlos Gómez">
        </div>
        <div class="form-group">
          <label class="text-muted small font-weight-bold">RUT / Documento:</label>
          <input type="text" id="nuevoRut" class="form-control" required placeholder="Ej: 19876543K">
        </div>
        <div class="form-group">
          <label class="text-muted small font-weight-bold">Alias / Identificador:</label>
          <input type="text" id="nuevoAlias" class="form-control" required placeholder="Ej: carlos.cbu">
        </div>
        <div class="form-group">
          <label class="text-muted small font-weight-bold">Banco:</label>
          <input type="text" id="nuevoBanco" class="form-control" required placeholder="Ej: Banco Estado">
        </div>

        <div class="d-grid gap-2 mt-4">
          <button type="submit" class="btn btn-morado-submit btn-block">Guardar Contacto</button>
          <button type="button" id="btnCancelarContacto" class="btn btn-secondary btn-block mt-2"
            style="border-radius: 8px;">Cancelar</button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="./js/sendmoney.js"></script>
</body>

</html>
