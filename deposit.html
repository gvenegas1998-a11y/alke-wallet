<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Wallet - Depositar</title>
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">
  <link rel="stylesheet" href="./css/deposit.css">
  <style>
    body {
      padding: 20px;
    }

    .container {
      max-width: 400px;
      margin: 200 auto;
    }
  </style>
</head>

<body>

  <nav class="navbar navbar-expand-lg bg-custom-purple mb-4 shadow-sm">
    <div class="container-fluid px-4">
      <a class="navbar-brand fw-bold text-white" href="#">Alke Wallet</a>
      <div class="d-flex ms-auto">
        <a href="index.html" class="btn btn-outline-light btn-sm fw-bold px-3 rounded-pill">
          Cerrar Sesión
        </a>
      </div>
    </div>
  </nav>
  <div class="container">
    <h2>Depositar</h2>

    <div class="card my-3 bg-light">
      <div class="card-body">
        <strong>Tu saldo actual es:</strong> <span id="saldoPrevio">$0</span>
      </div>
    </div>

    <div id="alert-container"></div>

    <form id="formDeposito">
      <div class="form-group">
        <label for="monto">Monto a depositar:</label>
        <input type="number" class="form-control" id="monto" placeholder="Ej: 5000" required min="1">
      </div>
      <button type="submit" class="btn btn-primary btn-block">Realizar depósito</button>
    </form>

    <div id="leyenda-deposito" class="mt-3 text-success font-weight-bold text-center"></div>

    <hr>
    <a href="menu.html" class="btn btn-secondary btn-block">Volver al Menú Principal</a>
  </div>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="./js/deposit.js"></script>
</body>

</html>
